version: "3.9"

# =============================================================================
# PACT Platform — Neutral Governance Plane
# =============================================================================
# This is the PACT governance service. It is NOT owned by either organisation.
# It runs independently and both orgs connect to it via mTLS.
# Ports: Postgres:5432, pgBouncer:6432, Redis:6379, OTel:4317/4318,
#        Prometheus:9090, Grafana:3000
# =============================================================================

networks:
  pact-net:
    driver: bridge
    name: pact-net

volumes:
  pact_postgres_data:
    name: pact_postgres_data
  pact_redis_data:
    name: pact_redis_data
  pact_prometheus_data:
    name: pact_prometheus_data
  pact_grafana_data:
    name: pact_grafana_data

services:

  # ---------------------------------------------------------------------------
  # Postgres 16 — PACT Control-Plane DB
  # Holds: sessions, constitutions, tenants, agents, policies, audit log
  # Production settings: WAL, shared_buffers, connection limits, DDL logging
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pact-postgres
    restart: unless-stopped
    networks: [pact-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pact
      POSTGRES_USER: pact_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c wal_level=logical
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c default_statistics_target=100
        -c log_statement=ddl
        -c log_min_duration_statement=500
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
        -c deadlock_timeout=1s
    volumes:
      - pact_postgres_data:/var/lib/postgresql/data
      - ./postgres/00_init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./postgres/01_register_orgs.sql:/docker-entrypoint-initdb.d/01_register_orgs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact_app -d pact"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # pgBouncer 1.22 — Connection Pooling
  # Sits in front of Postgres; PACT components connect here (port 6432)
  # Pool mode: transaction (optimal for short-lived enforcement queries)
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: bitnami/pgbouncer:1.22.0
    container_name: pact-pgbouncer
    restart: unless-stopped
    networks: [pact-net]
    ports:
      - "6432:6432"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: pact_app
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: pact
      PGBOUNCER_DATABASE: pact
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 10
      PGBOUNCER_RESERVE_POOL_TIMEOUT: 3
      PGBOUNCER_AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U pact_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7 — Session Runtime State
  # Holds: active session metadata, evaluation caches (non-cross-boundary)
  # Persistence: AOF (appendfsync everysec) + RDB snapshots
  # Eviction: allkeys-lru (memory-safe under load)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pact-redis
    restart: unless-stopped
    networks: [pact-net]
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --no-appendfsync-on-rewrite no
        --auto-aof-rewrite-percentage 100
        --auto-aof-rewrite-min-size 64mb
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --loglevel notice
    volumes:
      - pact_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — Distributed Tracing + Metrics
  # Receives traces from PACT components (gRPC:4317, HTTP:4318)
  # Exports metrics to Prometheus scrape endpoint (port 8889)
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: pact-otel
    restart: unless-stopped
    networks: [pact-net]
    ports:
      - "4317:4317"   # gRPC OTLP receiver
      - "4318:4318"   # HTTP OTLP receiver
      - "8888:8888"   # OTel internal metrics
      - "8889:8889"   # Prometheus scrape endpoint
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Prometheus 2.51 — Metrics Store
  # Scrapes: OTel collector, (future) Postgres exporter, Redis exporter
  # Alert rule: enforcement_decision_p95_ms > 100 → SLO breach
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pact-prometheus
    restart: unless-stopped
    networks: [pact-net]
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pact_prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Grafana 10.4 — SLO Dashboards
  # Pre-provisioned with PACT enforcement latency dashboard
  # Default: admin / ${GRAFANA_PASSWORD}
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: pact-grafana
    restart: unless-stopped
    networks: [pact-net]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - pact_grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
