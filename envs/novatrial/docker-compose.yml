version: "3.9"

# =============================================================================
# NovaTrial CRO — Isolated Organisation Environment
# =============================================================================
# This is NovaTrial's private infrastructure.
# Meridian Legal has ZERO visibility into this network or its data.
# The only external connection is outbound to PACT platform via mTLS.
#
# Ports: Postgres:5434, Redis:6381, Agent/MCP:4002
# Network: novatrial-net (isolated — no connection to meridian-net or pact-net)
# =============================================================================

networks:
  novatrial-net:
    driver: bridge
    name: novatrial-net

volumes:
  novatrial_postgres_data:
    name: novatrial_postgres_data
  novatrial_redis_data:
    name: novatrial_redis_data

services:

  # ---------------------------------------------------------------------------
  # Postgres 16 — NovaTrial's Internal DB
  # Holds: clinical trial portfolio, approved-for-DD summaries, regulatory records
  # Seeded with REAL ClinicalTrials.gov data fetched by bootstrap script.
  # PACT never reads this DB directly — Atlas (the agent) accesses it,
  # and every Atlas action is governed by PACT before it executes.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: novatrial-postgres
    restart: unless-stopped
    networks: [novatrial-net]
    ports:
      - "5434:5432"   # External port 5434 to avoid conflict
    environment:
      POSTGRES_DB: novatrial_db
      POSTGRES_USER: novatrial_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
        -c log_statement=ddl
        -c log_min_duration_statement=500
    volumes:
      - novatrial_postgres_data:/var/lib/postgresql/data
      - ./postgres/00_schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./postgres/01_seed.sql:/docker-entrypoint-initdb.d/01_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novatrial_app -d novatrial_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — NovaTrial's Agent Session Cache
  # Atlas's active session state and tool call result cache.
  # Port 6381 to avoid conflict.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: novatrial-redis
    restart: unless-stopped
    networks: [novatrial-net]
    ports:
      - "6381:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
    volumes:
      - novatrial_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
